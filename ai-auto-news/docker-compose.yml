version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}

      AI_PROVIDER: ${AI_PROVIDER:-mock}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}

      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      TASK_QUEUE_ENABLED: ${TASK_QUEUE_ENABLED:-true}
      SCHEDULER_INTERVAL_MS: ${SCHEDULER_INTERVAL_MS:-7200000}
      TASK_QUEUE_INTERVAL_MS: ${TASK_QUEUE_INTERVAL_MS:-10000}
      ALLOW_INSECURE_EXPERIMENTAL_APIS: ${ALLOW_INSECURE_EXPERIMENTAL_APIS:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - data:/app/data
    restart: unless-stopped

volumes:
  data:

